services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gbgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d gbgdata"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: web-app/Dockerfile
    environment:
      - DATABASE_URL=postgres://user:password@db:5432/gbgdata
      - NOMINATIM_URL=http://nominatim:8080/search
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/target
      - /app/web-app/target
    depends_on:
      db:
        condition: service_healthy

  nominatim:
    image: mediagis/nominatim:4.4
    shm_size: 4gb
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PBF_URL=https://download.geofabrik.de/europe/united-kingdom-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/europe/united-kingdom-updates/
      - NOMINATIM_POSTGRESQL_SHARED_BUFFERS=2GB
      - NOMINATIM_POSTGRESQL_MAINTENANCE_WORK_MEM=4GB
    volumes:
      - nominatim-data:/var/lib/postgresql/14/main

volumes:
  nominatim-data:
  db-data:
