services:
  db:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-gbgdata}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-gbgdata}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: web-app/Dockerfile.dev
    environment:
      - DATABASE_URL=postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-gbgdata}
      - NOMINATIM_URL=${NOMINATIM_URL:-}
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
      - LEPTOS_SASS_VERSION=1.98.0
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/app
      - /app/target
      - /app/web-app/target
    depends_on:
      db:
        condition: service_healthy

  # Nominatim is optional. Comment out if not needed.
  # Note: Requires significant RAM (8GB+ recommended)
  nominatim:
    image: mediagis/nominatim:4.4
    shm_size: 4gb
    restart: always
    ports:
      - "${NOMINATIM_PORT:-8080}:8080"
    environment:
      - PBF_URL=https://download.geofabrik.de/europe/united-kingdom-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/europe/united-kingdom-updates/
      - NOMINATIM_POSTGRESQL_SHARED_BUFFERS=2GB
      - NOMINATIM_POSTGRESQL_MAINTENANCE_WORK_MEM=4GB
    profiles:
      - with-geocoding
    volumes:
      - nominatim-data:/var/lib/postgresql/14/main

volumes:
  nominatim-data:
  db-data:
