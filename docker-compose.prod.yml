services:
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-gbgdata}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-gbgdata}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: web-app/Dockerfile
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER:-user}:${DB_PASSWORD:-password}@db:5432/${DB_NAME:-gbgdata}
      - NOMINATIM_URL=${NOMINATIM_URL:-}
      - LEPTOS_SITE_ADDR=0.0.0.0:3000
      - LEPTOS_SITE_ROOT=site
      - LEPTOS_ENV=PROD
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  # Optional Nominatim service
  nominatim:
    image: mediagis/nominatim:4.4
    shm_size: 4gb
    restart: always
    environment:
      - PBF_URL=https://download.geofabrik.de/europe/united-kingdom-latest.osm.pbf
      - REPLICATION_URL=https://download.geofabrik.de/europe/united-kingdom-updates/
    profiles:
      - with-geocoding
    volumes:
      - nominatim-data:/var/lib/postgresql/14/main

volumes:
  nominatim-data:
  db-data:
